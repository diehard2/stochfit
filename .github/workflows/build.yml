name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    permissions:
      packages: write        # vcpkg NuGet binary cache on GitHub Packages
      pull-requests: write   # failure comment on PR

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gfortran liblapack-dev mono-complete

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja libomp mono

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            build/vcpkg
            build/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('env/vcpkg-version.txt', 'vcpkg.json', 'env/ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-
            vcpkg-bootstrap-${{ runner.os }}-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < env/vcpkg-version.txt)"
          STAMP="build/vcpkg/.bootstrap-stamp"
          CACHED=""; [ -f "$STAMP" ] && CACHED="$(tr -d '[:space:]' < "$STAMP")"
          if [ "$CACHED" != "$VERSION" ]; then
            if [ -d "build/vcpkg/.git" ]; then
              git -C build/vcpkg fetch --tags
            else
              git clone --filter=blob:none --no-checkout https://github.com/microsoft/vcpkg.git build/vcpkg
            fi
            git -C build/vcpkg checkout "$VERSION"
            if [ "$RUNNER_OS" = "Windows" ]; then
              build/vcpkg/bootstrap-vcpkg.bat -disableMetrics
            else
              bash build/vcpkg/bootstrap-vcpkg.sh -disableMetrics
            fi
            echo "$VERSION" > "$STAMP"
          fi

      - name: Register vcpkg NuGet binary cache (GitHub Packages)
        shell: bash
        run: |
          FEED="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          if [ "$RUNNER_OS" = "Windows" ]; then
            VCPKG_BIN="build/vcpkg/vcpkg.exe"
          else
            VCPKG_BIN="build/vcpkg/vcpkg"
          fi
          NUGET_EXE="$($VCPKG_BIN fetch nuget 2>/dev/null | tail -1)"
          if [ -z "$NUGET_EXE" ]; then
            echo "vcpkg fetch nuget failed, skipping NuGet registration"
            exit 0
          fi
          if [ "$RUNNER_OS" != "Windows" ]; then
            NUGET="mono $NUGET_EXE"
          else
            NUGET="$NUGET_EXE"
          fi
          $NUGET sources add \
            -name "vcpkg-cache" \
            -source "$FEED" \
            -username "${{ github.repository_owner }}" \
            -password "${{ secrets.GITHUB_TOKEN }}" \
            -StorePasswordInClearText || true
          $NUGET setapikey "${{ secrets.GITHUB_TOKEN }}" -source "$FEED" || true

      - name: Configure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
        shell: bash
        run: |
          set -o pipefail
          PRESET=${{ runner.os == 'Windows' && 'windows' || 'default' }}
          cmake --preset "$PRESET" 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Configure failure on ${{ runner.os }}"; echo '```'; tail -100 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
        shell: bash
        run: |
          set -o pipefail
          PRESET=${{ runner.os == 'Windows' && 'windows' || 'default' }}
          cmake --build --preset "$PRESET" --parallel 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Build failure on ${{ runner.os }}"; echo '```'; tail -100 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Fix libomp rpath (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          LIBOMP=$(otool -L build/Release/bin/libstochfit.dylib | awk '/libomp/{print $1}')
          if [ -n "$LIBOMP" ]; then
            echo "Rewriting libomp reference: $LIBOMP -> @loader_path/libomp.dylib"
            install_name_tool -change "$LIBOMP" "@loader_path/libomp.dylib" build/Release/bin/libstochfit.dylib
          fi

      - name: Test (mirefl smoke test)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          EXT=${{ runner.os == 'Windows' && '.exe' || '' }}
          build/Release/bin/mirefl${EXT} 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Smoke test failure on ${{ runner.os }}"; echo '```'; cat /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: gui
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version

      - name: Package app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: 'electron-forge:*'
        working-directory: gui
        shell: bash
        run: |
          set -o pipefail
          npm run package 2>&1 | tee /tmp/package_out.txt || {
            { echo "## Package failure on ${{ runner.os }}"; echo '```'; tail -200 /tmp/package_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Debug package output
        shell: bash
        run: |
          echo "=== build/electron tree ==="
          find build/electron -maxdepth 3 -type d 2>/dev/null || echo "(no build/electron directory)"
          echo "=== package log (last 200 lines) ==="
          tail -200 /tmp/package_out.txt || echo "(no package log)"

      - name: Make installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: 'electron-forge:*'
        working-directory: gui
        shell: bash
        run: |
          set -o pipefail
          npm run make -- --skip-package 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Make installers failure on ${{ runner.os }}"; echo '```'; tail -200 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Upload Windows installer
        if: runner.os == 'Windows' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v5
        with:
          name: installer-windows
          path: build/electron/make/**/*.exe
          if-no-files-found: error

      - name: Upload macOS installer
        if: runner.os == 'macOS' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v5
        with:
          name: installer-macos
          path: build/electron/make/**/*.dmg
          if-no-files-found: error

      - name: Upload Linux installers
        if: runner.os == 'Linux' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v5
        with:
          name: installer-linux
          path: build/electron/make/zip/linux/**/*.zip
          if-no-files-found: error

      - name: Comment on PR failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "**${{ matrix.os }} build failed** — [view logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
