name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    permissions:
      packages: write        # vcpkg NuGet binary cache on GitHub Packages
      pull-requests: write   # failure comment on PR

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gfortran liblapack-dev dotnet-sdk-8.0

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja libomp

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: build/vcpkg
          key: vcpkg-bootstrap-${{ runner.os }}-${{ hashFiles('env/vcpkg-version.txt') }}

      - name: Register vcpkg NuGet binary cache (GitHub Packages)
        shell: bash
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name vcpkg-cache \
            --username "${{ github.repository_owner }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text || true

      - name: Configure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          VCPKG_BINARY_SOURCES: "clear;nuget,vcpkg-cache,readwrite"
        shell: bash
        run: |
          set -o pipefail
          PRESET=${{ runner.os == 'Windows' && 'windows' || 'default' }}
          cmake --preset "$PRESET" 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Configure failure on ${{ runner.os }}"; echo '```'; tail -100 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCPKG_BINARY_SOURCES: "clear;nuget,vcpkg-cache,readwrite"
        shell: bash
        run: |
          set -o pipefail
          PRESET=${{ runner.os == 'Windows' && 'windows' || 'default' }}
          cmake --build --preset "$PRESET" --parallel 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Build failure on ${{ runner.os }}"; echo '```'; tail -100 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Fix libomp rpath (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          LIBOMP=$(otool -L build/Release/bin/libstochfit.dylib | awk '/libomp/{print $1}')
          if [ -n "$LIBOMP" ]; then
            echo "Rewriting libomp reference: $LIBOMP -> @loader_path/libomp.dylib"
            install_name_tool -change "$LIBOMP" "@loader_path/libomp.dylib" build/Release/bin/libstochfit.dylib
          fi

      - name: Test (mirefl smoke test)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          EXT=${{ runner.os == 'Windows' && '.exe' || '' }}
          build/Release/bin/mirefl${EXT} 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Smoke test failure on ${{ runner.os }}"; echo '```'; cat /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: gui
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version

      - name: Make installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: gui
        shell: bash
        run: |
          set -o pipefail
          npm run make 2>&1 | tee /tmp/step_out.txt || {
            { echo "## Make installers failure on ${{ runner.os }}"; echo '```'; tail -100 /tmp/step_out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Upload Windows installer
        if: runner.os == 'Windows' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: build/electron/make/**/*.exe
          if-no-files-found: error

      - name: Upload macOS installer
        if: runner.os == 'macOS' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: build/electron/make/**/*.dmg
          if-no-files-found: error

      - name: Upload Linux installers
        if: runner.os == 'Linux' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: build/electron/make/zip/linux/**/*.zip

      - name: Comment on PR failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "**${{ matrix.os }} build failed** — [view logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
