name: Dependabot auto-merge

# pull_request_target runs with write permissions even for Dependabot PRs,
# which use a read-only token under the plain pull_request event.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge
        # Requires: repo Settings → General → "Allow auto-merge" checked,
        # AND branch protection on master with required status checks (the Build job).
        # GitHub will only execute the merge once all required checks pass.
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
