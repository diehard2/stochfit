name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    permissions:
      packages: write   # allows vcpkg to push built packages to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gfortran liblapack-dev dotnet-sdk-8.0

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja libomp

      - name: Setup dotnet (enables vcpkg NuGet binary cache on all platforms)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Cache vcpkg bootstrap
        uses: actions/cache@v4
        with:
          path: build/vcpkg
          key: vcpkg-bootstrap-${{ runner.os }}-${{ hashFiles('env/vcpkg-version.txt') }}

      - name: Install CUDA
        if: runner.os != 'macOS'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.1.0'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'env/vcpkg-version.txt', 'env/ports/**') }}

      - name: Configure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset default --parallel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Make installers
        working-directory: gui
        run: npm run make

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: build/electron/out/make/squirrel.windows/**/*.exe

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: build/electron/out/make/*.dmg

      - name: Upload Linux installers
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            build/electron/out/make/deb/**/*.deb
            build/electron/out/make/rpm/**/*.rpm

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: artifacts/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-macos
          path: artifacts/macos

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: installer-linux
          path: artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/**/*
            artifacts/macos/**/*
            artifacts/linux/**/*
          generate_release_notes: true
